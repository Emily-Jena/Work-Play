<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body { font-family: 'IBM Plex Sans', sans-serif; overflow-x: hidden; }
    input, textarea, button { font-family: 'IBM Plex Sans', sans-serif; }
    input::placeholder, textarea::placeholder { opacity: 0.5; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a3a4e; border-radius: 3px; }
    textarea { -webkit-overflow-scrolling: touch; }
    .sidebar { width:248px; flex-shrink:0; position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column; overflow-y:auto; z-index:200; transition:transform .25s ease, background .25s, border-color .25s; }
    .topbar { display:none; }
    .overlay { display:none; }
    .main-content { margin-left:248px; flex:1; min-width:0; }
    .half { flex:1 1 45% !important; }
    @media (max-width:768px) {
      .sidebar { transform:translateX(-100%); width:280px; box-shadow:4px 0 24px rgba(0,0,0,0.35); }
      .sidebar.open { transform:translateX(0); }
      .topbar { display:flex; align-items:center; justify-content:space-between; position:fixed; top:0; left:0; right:0; height:56px; z-index:190; padding:0 16px; }
      .overlay { display:block; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:150; opacity:0; pointer-events:none; transition:opacity .25s; }
      .overlay.visible { opacity:1; pointer-events:all; }
      .main-content { margin-left:0; padding-top:56px; }
      .half { flex:1 1 100% !important; }
    }
    @media (max-width:480px) { .main-content { padding:72px 16px 32px !important; } }
    .g-btn-wrap { width:100%; min-height:44px; display:flex; align-items:center; justify-content:center; }
    .g-btn-wrap iframe { border-radius:8px !important; }
    .theme-swatch { width:36px; height:36px; border-radius:8px; cursor:pointer; transition:transform .15s, box-shadow .15s; border:2px solid transparent; }
    .theme-swatch:hover { transform:scale(1.1); }
    .theme-swatch.active { border-color:#c9a84c; box-shadow:0 0 0 3px rgba(201,168,76,0.3); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

  /* ══════════════════════════════════════════════════════════════
     Paste your Google OAuth Client ID below (see setup guide).
  ══════════════════════════════════════════════════════════════ */
  const GOOGLE_CLIENT_ID = "YOUR_CLIENT_ID_HERE";
  const GOOGLE_READY = GOOGLE_CLIENT_ID !== "YOUR_CLIENT_ID_HERE";

  /* ── Sections ── */
  const SECTIONS = [
    { id:"about",      label:"About Me",       icon:"👤", color:"#c9a84c", darkColor:"#e8c86a", badge:{bg:"#fdf3dc",text:"#7a5a00",border:"#f0d890",darkBg:"#3a2e00",darkText:"#f0d070",darkBorder:"#6a5000"} },
    { id:"experience", label:"Work Experience", icon:"💼", color:"#2a72c8", darkColor:"#5a9ff5", badge:{bg:"#e8f0fc",text:"#1a3a7a",border:"#bad0f8",darkBg:"#0c1e40",darkText:"#7ab8ff",darkBorder:"#1a3a7a"} },
    { id:"projects",   label:"Projects",        icon:"🛠", color:"#12967a", darkColor:"#28c49a", badge:{bg:"#e2f5f0",text:"#0a4a38",border:"#9adece",darkBg:"#052a20",darkText:"#40d8b0",darkBorder:"#0a5040"} },
    { id:"skills",     label:"Skills",          icon:"⚡", color:"#8b3db8", darkColor:"#b87de8", badge:{bg:"#f2e8fc",text:"#4a1a70",border:"#d4a8f0",darkBg:"#200a35",darkText:"#d090ff",darkBorder:"#5a1a90"} },
    { id:"education",  label:"Education",       icon:"🎓", color:"#c05c20", darkColor:"#f08040", badge:{bg:"#fdf0e8",text:"#6a2800",border:"#f0c098",darkBg:"#351200",darkText:"#f09050",darkBorder:"#7a3000"} },
  ];
  const sec = id => SECTIONS.find(s => s.id === id);

  /* ── BG Theme presets ── */
  const LIGHT_PRESETS = [
    { id:"ivory",   label:"Warm Ivory",  swatch:"#f5f2eb", bg:"#f5f2eb", surface:"#ffffff", surfaceAlt:"#f9f7f3", inputBg:"#f5f2eb" },
    { id:"snow",    label:"Snow",        swatch:"#f8f9fa", bg:"#f8f9fa", surface:"#ffffff", surfaceAlt:"#f1f3f5", inputBg:"#f8f9fa" },
    { id:"slate",   label:"Cool Slate",  swatch:"#edf2f7", bg:"#edf2f7", surface:"#ffffff", surfaceAlt:"#e2e8f0", inputBg:"#edf2f7" },
    { id:"rose",    label:"Soft Rose",   swatch:"#fdf0f2", bg:"#fdf0f2", surface:"#ffffff", surfaceAlt:"#fce7ea", inputBg:"#fdf0f2" },
    { id:"sage",    label:"Sage",        swatch:"#f0f5f0", bg:"#f0f5f0", surface:"#ffffff", surfaceAlt:"#e6f0e6", inputBg:"#f0f5f0" },
    { id:"linen",   label:"Linen",       swatch:"#faf6f0", bg:"#faf6f0", surface:"#fffdf9", surfaceAlt:"#f5f0e8", inputBg:"#faf6f0" },
  ];
  const DARK_PRESETS = [
    { id:"navy",     label:"Navy",      swatch:"#111827", bg:"#111827", surface:"#1a2535", surfaceAlt:"#1e2c3e", inputBg:"#131e2e" },
    { id:"midnight", label:"Midnight",  swatch:"#0d1117", bg:"#0d1117", surface:"#161b22", surfaceAlt:"#1c2128", inputBg:"#0d1117" },
    { id:"charcoal", label:"Charcoal",  swatch:"#1c1c1e", bg:"#1c1c1e", surface:"#2c2c2e", surfaceAlt:"#3a3a3c", inputBg:"#1c1c1e" },
    { id:"deepblue", label:"Deep Blue", swatch:"#0a0f1e", bg:"#0a0f1e", surface:"#0f1829", surfaceAlt:"#141e30", inputBg:"#080e1a" },
  ];

  /* ── Base theme palettes (sidebar, text, borders — not bg) ── */
  /* FIX: Light sidebar is now truly light — white with dark text */
  const LIGHT_BASE = {
    sidebar:"#ffffff", sidebarHov:"#f5f2eb", sideBorder:"#ddd8cc",
    sideText:"#1a1a1a", sideMuted:"#7a7470", topbar:"#ffffff",
    border:"#ddd8cc", text:"#1a1a1a", textSec:"#4a4540", muted:"#7a7470",
    gold:"#c9a84c", goldHov:"#b8922e",
    danger:"#c0392b", dangerBg:"#fdf0f0", dangerBorder:"#f5c0c0",
  };
  const DARK_BASE = {
    sidebar:"#080f1a", sidebarHov:"#0e1a2a", sideBorder:"#142030",
    sideText:"#c0b8a8", sideMuted:"#5a7090", topbar:"#080f1a",
    border:"#2a3a4e", text:"#e4ddd4", textSec:"#b0a898", muted:"#7a8fa6",
    gold:"#d8b85a", goldHov:"#c9a84c",
    danger:"#e87070", dangerBg:"#2a1010", dangerBorder:"#5a2020",
  };

  const buildTheme = (dark, presetId) => {
    const base  = dark ? DARK_BASE  : LIGHT_BASE;
    const presets = dark ? DARK_PRESETS : LIGHT_PRESETS;
    const preset  = presets.find(p=>p.id===presetId) || presets[0];
    return { ...base, bg:preset.bg, surface:preset.surface, surfaceAlt:preset.surfaceAlt, inputBg:preset.inputBg };
  };

  const ThemeCtx = createContext({ t:buildTheme(false,"ivory"), dark:false });
  const useT = () => useContext(ThemeCtx);

  /* ── Empties — images added to all entry types ── */
  const emptyAbout   = { name:"",title:"",bio:"",location:"",email:"",website:"",linkedin:"",github:"",twitter:"",instagram:"",youtube:"",facebook:"",tiktok:"", socialEnabled:[] };
  const emptyExp     = { company:"",role:"",startDate:"",endDate:"",current:false,description:"",image:"" };
  const emptyProject = { name:"",description:"",tech:"",link:"",year:"",image:"" };
  const emptySkill   = { category:"",items:"",image:"" };
  const emptyEdu     = { institution:"",degree:"",field:"",startYear:"",endYear:"",gpa:"",description:"",image:"" };

  /* ── Storage ── */
  const ls = {
    get:    k=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch{ return null; } },
    set:    (k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },
    raw:    k=>{ try{ return localStorage.getItem(k); }catch{ return null; } },
    rawSet: (k,v)=>{ try{ localStorage.setItem(k,v); return true; }catch{ return false; } },
    del:    k=>{ try{ localStorage.removeItem(k); }catch{} },
  };
  const hashStr = s=>{ let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return h.toString(36); };

  /* ══════════════════════════════════════════
     MODULE-LEVEL COMPONENTS
  ══════════════════════════════════════════ */

  function Badge({ children, sectionId }) {
    const { dark } = useT(); const s=sec(sectionId);
    return <span style={{ background:dark?s.badge.darkBg:s.badge.bg, color:dark?s.badge.darkText:s.badge.text, border:`1px solid ${dark?s.badge.darkBorder:s.badge.border}`, fontSize:12, fontFamily:"'IBM Plex Mono',monospace", padding:"3px 9px", borderRadius:4, whiteSpace:"nowrap", display:"inline-block" }}>{children}</span>;
  }

  function SectionLabel({ sectionId }) {
    const { dark } = useT(); const s=sec(sectionId);
    const color = sectionId==="settings"?(dark?"#9ca3af":"#6b7280"):(dark?s.darkColor:s.color);
    const label = sectionId==="settings"?"Settings":s.label;
    const icon  = sectionId==="settings"?"⚙️":s.icon;
    return <span style={{ fontSize:11, fontFamily:"'IBM Plex Mono',monospace", letterSpacing:"0.1em", textTransform:"uppercase", color, fontWeight:500 }}>{icon}&nbsp;&nbsp;{label}</span>;
  }

  function GoldBtn({ onClick, children, outline, danger, fullWidth, disabled, small }) {
    const { t } = useT(); const [hov,setHov]=useState(false);
    const bg  = danger?(hov?"#a93226":t.danger):outline?"transparent":(hov?t.goldHov:t.gold);
    const col = danger?"#fff":outline?(hov?t.gold:t.muted):"#fff";
    const bdr = danger?t.danger:outline?t.border:t.gold;
    return <button onClick={onClick} disabled={disabled} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:bg, color:col, border:`1px solid ${bdr}`, borderRadius:6, padding:small?"6px 12px":"9px 18px", fontSize:small?12:14, fontWeight:500, cursor:disabled?"not-allowed":"pointer", transition:"all .15s", minHeight:small?32:40, opacity:disabled?0.5:1, width:fullWidth?"100%":"auto" }}>{children}</button>;
  }

  function IconBtn({ onClick, label, danger }) {
    const { t } = useT(); const [hov,setHov]=useState(false);
    return <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:"none", border:`1px solid ${hov?(danger?"#e87070":t.gold):t.border}`, borderRadius:5, padding:"5px 12px", fontSize:12, cursor:"pointer", color:hov?(danger?"#d04040":t.gold):t.muted, transition:"all .12s", minHeight:32 }}>{label}</button>;
  }

  function Field({ label, value, onChange, as, rows, placeholder, type, half, hint }) {
    const { t } = useT();
    const base = { width:"100%", background:t.inputBg, border:`1px solid ${t.border}`, borderRadius:6, padding:"10px 12px", fontSize:15, color:t.text, boxSizing:"border-box", outline:"none", fontFamily:"'IBM Plex Sans',sans-serif", WebkitAppearance:"none" };
    return (
      <div className={half?"half":""} style={{ flex:"1 1 100%", marginBottom:14 }}>
        <label style={{ display:"block", fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>{label}</label>
        {as==="textarea"
          ?<textarea value={value} onChange={onChange} rows={rows||3} placeholder={placeholder} style={{ ...base, resize:"vertical" }} />
          :<input type={type||"text"} value={value} onChange={onChange} placeholder={placeholder} style={base} />}
        {hint&&<p style={{ fontSize:12, color:t.muted, marginTop:4 }}>{hint}</p>}
      </div>
    );
  }

  /* ── Image upload widget for entries ── */
  function EntryImageUpload({ value, onChange }) {
    const { t } = useT();
    const ref = useRef();
    const [err, setErr] = useState("");

    const handle = e => {
      const file = e.target.files[0]; if(!file) return;
      setErr("");
      if(file.size > 800*1024){ setErr("Image must be under 800 KB."); return; }
      const reader = new FileReader();
      reader.onload = ev => onChange(ev.target.result);
      reader.readAsDataURL(file);
    };

    return (
      <div style={{ flex:"1 1 100%", marginBottom:14 }}>
        <label style={{ display:"block", fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>Entry Image (optional)</label>
        {value ? (
          <div style={{ position:"relative", display:"inline-block" }}>
            <img src={value} alt="Entry" style={{ width:"100%", maxHeight:160, objectFit:"cover", borderRadius:8, border:`1px solid ${t.border}`, display:"block" }} />
            <button onClick={()=>onChange("")}
              style={{ position:"absolute", top:6, right:6, background:"rgba(0,0,0,0.6)", color:"#fff", border:"none", borderRadius:"50%", width:24, height:24, cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>×</button>
          </div>
        ) : (
          <div onClick={()=>ref.current.click()}
            style={{ border:`1.5px dashed ${t.border}`, borderRadius:8, padding:"20px", textAlign:"center", cursor:"pointer", background:t.inputBg, transition:"border-color .15s" }}>
            <div style={{ fontSize:24, marginBottom:6 }}>🖼️</div>
            <p style={{ fontSize:13, color:t.muted, margin:0 }}>Click to upload image</p>
            <p style={{ fontSize:11, color:t.muted, margin:"4px 0 0" }}>JPG, PNG, GIF — max 800 KB</p>
          </div>
        )}
        {err&&<p style={{ color:t.danger, fontSize:12, marginTop:6, padding:"6px 10px", background:t.dangerBg, borderRadius:5, border:`1px solid ${t.dangerBorder}` }}>{err}</p>}
        <input ref={ref} type="file" accept="image/*" onChange={handle} style={{ display:"none" }} />
      </div>
    );
  }

  function Empty({ label }) {
    const { t } = useT();
    return <div style={{ textAlign:"center", padding:"48px 20px", border:`1.5px dashed ${t.border}`, borderRadius:10, color:t.muted, fontSize:14 }}><div style={{ fontSize:32, marginBottom:10 }}>📋</div>{label}</div>;
  }

  function ViewCard({ children, sectionId, image }) {
    const { t, dark } = useT(); const s=sec(sectionId); const accent=dark?s.darkColor:s.color;
    return (
      <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:10, marginBottom:14, borderLeft:`3px solid ${accent}`, overflow:"hidden" }}>
        {image&&<img src={image} alt="" style={{ width:"100%", maxHeight:140, objectFit:"cover", display:"block" }} />}
        <div style={{ padding:"16px 20px" }}>{children}</div>
      </div>
    );
  }

  function EditCard({ children, onEdit, onDelete, sectionId, image }) {
    const { t, dark } = useT(); const s=sec(sectionId); const accent=dark?s.darkColor:s.color;
    return (
      <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:10, marginBottom:14, borderLeft:`3px solid ${accent}`, overflow:"hidden", transition:"border-color .2s" }}>
        {image&&<img src={image} alt="" style={{ width:"100%", maxHeight:140, objectFit:"cover", display:"block" }} />}
        <div style={{ padding:"16px 18px" }}>
          {children}
          <div style={{ display:"flex", gap:8, marginTop:14, justifyContent:"flex-end" }}>
            <IconBtn onClick={onEdit} label="Edit" />
            <IconBtn onClick={onDelete} label="Remove" danger />
          </div>
        </div>
      </div>
    );
  }

  function EditModal({ title, sectionId, onClose, onSave, children }) {
    const { t, dark } = useT();
    const accent = sectionId?(dark?sec(sectionId).darkColor:sec(sectionId).color):t.gold;
    return (
      <div style={{ position:"fixed", inset:0, background:"rgba(5,12,22,0.75)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
        <div style={{ background:t.surface, borderRadius:14, width:"100%", maxWidth:580, maxHeight:"92vh", overflowY:"auto", border:`1px solid ${t.border}`, borderTop:`3px solid ${accent}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"16px 20px", borderBottom:`1px solid ${t.border}` }}>
            <h3 style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:600, color:t.text, margin:0 }}>{title}</h3>
            <button onClick={onClose} style={{ background:"none", border:"none", fontSize:26, cursor:"pointer", color:t.muted, lineHeight:1, minWidth:36, minHeight:36 }}>×</button>
          </div>
          <div style={{ padding:"20px" }}>{children}</div>
          <div style={{ display:"flex", justifyContent:"flex-end", gap:10, padding:"14px 20px", borderTop:`1px solid ${t.border}`, background:t.surfaceAlt, borderRadius:"0 0 14px 14px", flexWrap:"wrap" }}>
            <GoldBtn outline onClick={onClose}>Cancel</GoldBtn>
            <GoldBtn onClick={onSave}>Save Entry</GoldBtn>
          </div>
        </div>
      </div>
    );
  }

  function HamburgerIcon({ open, color }) {
    const s={ display:"block", width:22, height:2, background:color||"#c8bfb0", borderRadius:2, transition:"all .25s" };
    return (
      <div style={{ width:24, height:18, display:"flex", flexDirection:"column", justifyContent:"space-between", cursor:"pointer" }}>
        <span style={{ ...s, transform:open?"rotate(45deg) translate(5px,8px)":"none" }} />
        <span style={{ ...s, opacity:open?0:1 }} />
        <span style={{ ...s, transform:open?"rotate(-45deg) translate(5px,-8px)":"none" }} />
      </div>
    );
  }

  function SettingsDivider({ label }) {
    const { t } = useT();
    return (
      <div style={{ display:"flex", alignItems:"center", gap:12, margin:"20px 0 16px" }}>
        <div style={{ flex:1, height:1, background:t.border }} />
        {label&&<span style={{ fontSize:11, fontWeight:500, color:t.muted, textTransform:"uppercase", letterSpacing:"0.08em", whiteSpace:"nowrap" }}>{label}</span>}
        <div style={{ flex:1, height:1, background:t.border }} />
      </div>
    );
  }

  function PwForm({ mode, onSuccess }) {
    const { t } = useT();
    const [pw,setPw]=[useState(""),useState("")];
    const [pw0,setPw0]=useState(""); // current pw for "change"
    const [pw1,setPw1]=useState(""); // new pw
    const [cfm,setCfm]=useState(""); // confirm
    const [err,setErr]=useState("");
    const [show,setShow]=useState(false);
    const [done,setDone]=useState(false);

    const eyeStyle={ width:"100%", background:t.inputBg, border:`1px solid ${err?t.danger:t.border}`, borderRadius:8, padding:"10px 44px 10px 12px", fontSize:14, color:t.text, outline:"none", boxSizing:"border-box" };

    const submit=()=>{
      setErr("");
      if(mode==="login"){
        const stored=ls.raw("pf_pw");
        if(!stored){ setErr("No password set yet."); return; }
        if(hashStr(pw1)!==stored){ setErr("Incorrect password."); setPw1(""); return; }
        onSuccess();
      } else if(mode==="set"){
        if(pw1.length<4){ setErr("At least 4 characters required."); return; }
        if(pw1!==cfm){ setErr("Passwords do not match."); return; }
        ls.rawSet("pf_pw", hashStr(pw1)); setDone(true); setPw1(""); setCfm(""); setTimeout(()=>setDone(false),2500);
      } else if(mode==="change"){
        const stored=ls.raw("pf_pw");
        if(stored&&hashStr(pw0)!==stored){ setErr("Current password is incorrect."); return; }
        if(pw1.length<4){ setErr("New password must be at least 4 characters."); return; }
        if(pw1!==cfm){ setErr("Passwords do not match."); return; }
        ls.rawSet("pf_pw", hashStr(pw1)); setDone(true); setPw0(""); setPw1(""); setCfm(""); setTimeout(()=>setDone(false),2500);
      }
    };

    const fld=(val,set,ph)=>(
      <div style={{ position:"relative", marginBottom:10 }}>
        <input type={show?"text":"password"} value={val} onChange={e=>set(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder={ph} style={eyeStyle} />
        <button onClick={()=>setShow(s=>!s)} type="button" style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", color:t.muted, fontSize:15, padding:4 }}>{show?"🙈":"👁"}</button>
      </div>
    );

    return (
      <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
        {mode==="change"&&ls.raw("pf_pw")&&(<><label style={{ fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", display:"block" }}>Current Password</label>{fld(pw0,setPw0,"Enter current password…")}</>)}
        <label style={{ fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", display:"block" }}>{mode==="login"?"Password":mode==="change"?"New Password":"Password"}</label>
        {fld(pw1,setPw1,mode==="login"?"Enter password…":"Choose a password…")}
        {(mode==="set"||mode==="change")&&(<><label style={{ fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em", display:"block" }}>Confirm Password</label>{fld(cfm,setCfm,"Confirm password…")}</>)}
        {err&&<p style={{ color:t.danger, fontSize:13, padding:"8px 12px", background:t.dangerBg, borderRadius:6, border:`1px solid ${t.dangerBorder}`, margin:"6px 0" }}>{err}</p>}
        {done&&<p style={{ color:"#2d7a3a", fontSize:13, padding:"8px 12px", background:"#edf7ee", borderRadius:6, border:"1px solid #b8e0bf", margin:"6px 0" }}>✓ Password saved!</p>}
        <button onClick={submit} style={{ background:t.gold, color:"#fff", border:"none", borderRadius:8, padding:"10px 16px", fontSize:14, fontWeight:500, cursor:"pointer", width:"100%", minHeight:42, marginTop:4 }}>
          {mode==="login"?"Unlock with Password":mode==="change"?"Update Password":"Set Password"}
        </button>
      </div>
    );
  }

  /* ── Social link helper ── */
  const SOCIALS = [
    { key:"linkedin",  icon:"💼", label:"LinkedIn",  prefix:"https://linkedin.com/in/" },
    { key:"github",    icon:"🐙", label:"GitHub",    prefix:"https://github.com/" },
    { key:"twitter",   icon:"🐦", label:"Twitter / X", prefix:"https://twitter.com/" },
    { key:"instagram", icon:"📸", label:"Instagram", prefix:"https://instagram.com/" },
    { key:"youtube",   icon:"▶️", label:"YouTube",   prefix:"https://youtube.com/" },
    { key:"facebook",  icon:"👥", label:"Facebook",  prefix:"https://facebook.com/" },
    { key:"tiktok",    icon:"🎵", label:"TikTok",    prefix:"https://tiktok.com/@" },
  ];

  const buildSocialUrl = (key, val) => {
    if(!val) return null;
    if(val.startsWith("http://") || val.startsWith("https://")) return val;
    const s = SOCIALS.find(s=>s.key===key);
    return s ? s.prefix + val.replace(/^@/,"") : val;
  };

  /* ══════════════════════════════════════════
     MAIN APP
  ══════════════════════════════════════════ */
  function Portfolio() {
    const [dark, setDark]           = useState(()=>ls.get("pf_dark")??false);
    const [bgPreset, setBgPreset]   = useState(()=>ls.get("pf_bg_preset")||(dark?"navy":"ivory"));
    const [active, setActive]       = useState("about");
    const [about, setAbout]         = useState(()=>ls.get("pf_about")??emptyAbout);
    const [experiences, setExp]     = useState(()=>ls.get("pf_exp")??[]);
    const [projects, setProj]       = useState(()=>ls.get("pf_proj")??[]);
    const [skills, setSkills]       = useState(()=>ls.get("pf_skills")??[]);
    const [education, setEdu]       = useState(()=>ls.get("pf_edu")??[]);
    const [modal, setModal]         = useState(null);
    const [draft, setDraft]         = useState({});
    const [editIdx, setEditIdx]     = useState(null);
    const [photoSrc, setPhoto]      = useState(()=>ls.raw("pf_photo")??null);
    const [photoErr, setPhotoErr]   = useState("");
    const [saved, setSaved]         = useState(false);
    const [menuOpen, setMenu]       = useState(false);
    const [editMode, setEditMode]   = useState(false);
    const [authMethod, setAuthM]    = useState(null);
    const [googleEmail, setGEmail]  = useState(()=>ls.raw("pf_google_email"));
    const [googleErr, setGErr]      = useState("");
    const [settingsView, setSView]  = useState("main");
    const fileRef = useRef();

    const t = buildTheme(dark, bgPreset);

    useEffect(()=>{
      const h=()=>{ if(window.innerWidth>768) setMenu(false); };
      window.addEventListener("resize",h); return()=>window.removeEventListener("resize",h);
    },[]);

    const persist = (k,v)=>ls.set(k,v);
    const flash   = ()=>{ setSaved(true); setTimeout(()=>setSaved(false),2000); };

    const toggleDark = ()=>{
      const n=!dark; setDark(n); persist("pf_dark",n);
      // switch to matching default preset when toggling
      const newPreset = n?"navy":"ivory";
      setBgPreset(newPreset); persist("pf_bg_preset",newPreset);
    };

    const pickPreset = id=>{ setBgPreset(id); persist("pf_bg_preset",id); };
    const saveAbout  = ()=>{ persist("pf_about",about); flash(); };

    /* Google */
    const handleGoogleCb = useCallback(response=>{
      setGErr("");
      try {
        const b64=response.credential.split(".")[1].replace(/-/g,"+").replace(/_/g,"/");
        const payload=JSON.parse(atob(b64.padEnd(b64.length+(4-b64.length%4)%4,"=")));
        const email=payload.email;
        const stored=ls.raw("pf_google_email");
        if(!stored){ ls.rawSet("pf_google_email",email); setGEmail(email); setAuthM("google"); setEditMode(true); setActive("about"); }
        else if(email===stored){ setAuthM("google"); setEditMode(true); setActive("about"); }
        else { setGErr(`Access denied. Only ${stored} can edit this portfolio.`); }
      } catch{ setGErr("Google sign-in failed. Please try again."); }
    },[]);

    const gBtnRef = useCallback(node=>{
      if(!node||!GOOGLE_READY||!window.google) return;
      node.innerHTML="";
      try {
        window.google.accounts.id.initialize({ client_id:GOOGLE_CLIENT_ID, callback:handleGoogleCb, auto_select:false });
        window.google.accounts.id.renderButton(node,{ theme:"outline", size:"large", text:"signin_with", shape:"rectangular", logo_alignment:"left", width:Math.min((node.parentElement?.offsetWidth||380),420) });
      } catch(e){ console.warn("Google Sign-In error:",e); }
    },[handleGoogleCb]);

    const lockDown = ()=>{ setEditMode(false); setAuthM(null); setSView("main"); try{ window.google?.accounts.id.disableAutoSelect(); }catch{} };
    const onPwSuccess = ()=>{ setAuthM("password"); setEditMode(true); setActive("about"); };

    const resetAll = ()=>{
      ["pf_about","pf_exp","pf_proj","pf_skills","pf_edu","pf_dark","pf_photo","pf_pw","pf_google_email","pf_bg_preset"].forEach(k=>ls.del(k));
      setAbout(emptyAbout); setExp([]); setProj([]); setSkills([]); setEdu([]);
      setPhoto(null); setGEmail(null); setDark(false); setBgPreset("ivory"); lockDown(); setSView("main");
    };

    const handlePhoto = e=>{
      const file=e.target.files[0]; if(!file) return; setPhotoErr("");
      if(file.size>2*1024*1024){ setPhotoErr("Image too large. Please use a file under 2 MB."); return; }
      const reader=new FileReader();
      reader.onload=ev=>{ const src=ev.target.result; if(!ls.rawSet("pf_photo",src)){ setPhotoErr("Storage full."); return; } setPhoto(src); };
      reader.readAsDataURL(file);
    };

    const df = field=>e=>{ const val=e.target.type==="checkbox"?e.target.checked:e.target.value; setDraft(p=>({...p,[field]:val})); };
    const dImg = val=>setDraft(p=>({...p,image:val}));

    const openAdd  = type=>{ setModal(type); setDraft(type==="experience"?{...emptyExp}:type==="project"?{...emptyProject}:type==="skill"?{...emptySkill}:{...emptyEdu}); setEditIdx(null); };
    const openEdit = (type,idx,data)=>{ setModal(type); setDraft({...data}); setEditIdx(idx); };
    const saveModal = ()=>{
      const upd=(arr,val,idx)=>idx!==null?arr.map((x,i)=>i===idx?val:x):[...arr,val];
      if(modal==="experience"){ const u=upd(experiences,draft,editIdx); setExp(u); persist("pf_exp",u); }
      if(modal==="project")   { const u=upd(projects,draft,editIdx);    setProj(u); persist("pf_proj",u); }
      if(modal==="skill")     { const u=upd(skills,draft,editIdx);      setSkills(u); persist("pf_skills",u); }
      if(modal==="education") { const u=upd(education,draft,editIdx);   setEdu(u); persist("pf_edu",u); }
      setModal(null);
    };
    const del = (type,idx)=>{
      if(type==="experience"){ const u=experiences.filter((_,i)=>i!==idx); setExp(u); persist("pf_exp",u); }
      if(type==="project")   { const u=projects.filter((_,i)=>i!==idx);    setProj(u); persist("pf_proj",u); }
      if(type==="skill")     { const u=skills.filter((_,i)=>i!==idx);      setSkills(u); persist("pf_skills",u); }
      if(type==="education") { const u=education.filter((_,i)=>i!==idx);   setEdu(u); persist("pf_edu",u); }
    };

    const navTo = id=>{ setActive(id); setMenu(false); };
    const activeSec   = active==="settings"?null:sec(active);
    const activeColor = activeSec?(dark?activeSec.darkColor:activeSec.color):(dark?"#9ca3af":"#6b7280");
    const settingsColor = dark?"#9ca3af":"#6b7280";

    /* ── Sidebar nav text/icon color adapts to light/dark sidebar ── */
    const sideTextColor = dark ? t.sideText : "#1a1a1a";
    const sideMutedColor = dark ? t.sideMuted : "#7a7470";
    const sideActiveBg = dark ? t.sidebarHov : "#f0ede5";

    /* ════════════════════════════════════════
       SETTINGS PANEL
    ════════════════════════════════════════ */
    const renderSettings = ()=>{
      if(!editMode) return (
        <div style={{ maxWidth:480 }}>
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, overflow:"hidden" }}>
            <div style={{ padding:"22px 24px 18px", borderBottom:`1px solid ${t.border}` }}>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:600, color:t.text, margin:"0 0 4px" }}>Sign in to Edit</p>
              <p style={{ fontSize:13, color:t.muted, margin:0 }}>Only the owner can make changes. Visitors see a read-only view.</p>
            </div>
            <div style={{ padding:"22px 24px" }}>
              {GOOGLE_READY?(
                <div>
                  <label style={{ display:"block", fontSize:11, fontWeight:500, color:t.muted, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.06em" }}>Google Account</label>
                  <div ref={gBtnRef} className="g-btn-wrap" />
                  {googleErr&&<p style={{ color:t.danger, fontSize:13, padding:"8px 12px", background:t.dangerBg, borderRadius:6, border:`1px solid ${t.dangerBorder}`, marginTop:10 }}>{googleErr}</p>}
                </div>
              ):(
                <div style={{ background:t.surfaceAlt, border:`1px solid ${t.border}`, borderRadius:8, padding:"14px 16px" }}>
                  <p style={{ fontSize:13, color:t.muted, margin:"0 0 6px", fontWeight:500 }}>⚙️ Google Login Not Configured</p>
                  <p style={{ fontSize:12, color:t.muted, margin:0, lineHeight:1.7 }}>Open <code style={{ background:t.border, padding:"1px 5px", borderRadius:3 }}>index.html</code> and replace <code style={{ background:t.border, padding:"1px 5px", borderRadius:3 }}>YOUR_CLIENT_ID_HERE</code> with your Google OAuth Client ID.</p>
                </div>
              )}
              <SettingsDivider label="or use password" />
              {ls.raw("pf_pw")
                ?<PwForm mode="login" onSuccess={onPwSuccess} />
                :<div style={{ background:t.surfaceAlt, border:`1px solid ${t.border}`, borderRadius:8, padding:"14px 16px" }}>
                  <p style={{ fontSize:13, color:t.muted, margin:"0 0 4px", fontWeight:500 }}>No password set yet</p>
                  <p style={{ fontSize:12, color:t.muted, margin:0, lineHeight:1.7 }}>Sign in with Google to set a password after logging in.</p>
                </div>
              }
            </div>
          </div>
        </div>
      );

      if(settingsView==="changeEmail") return (
        <div style={{ maxWidth:480 }}>
          <button onClick={()=>setSView("main")} style={{ background:"none", border:"none", cursor:"pointer", color:t.muted, fontSize:13, padding:"0 0 16px", display:"flex", alignItems:"center", gap:6 }}>← Back</button>
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, padding:"24px" }}>
            <p style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:600, color:t.text, margin:"0 0 8px" }}>Change Google Account</p>
            <p style={{ fontSize:13, color:t.muted, margin:"0 0 16px", lineHeight:1.7 }}>Removes the current owner Google account. The next Google sign-in will become the new owner.</p>
            <div style={{ background:t.dangerBg, border:`1px solid ${t.dangerBorder}`, borderRadius:8, padding:"12px 16px", marginBottom:18 }}>
              <p style={{ fontSize:13, color:t.danger, margin:0, fontWeight:500 }}>⚠️ Current: {googleEmail||"Not set"}</p>
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <GoldBtn outline onClick={()=>setSView("main")}>Cancel</GoldBtn>
              <GoldBtn danger onClick={()=>{ ls.del("pf_google_email"); setGEmail(null); lockDown(); }}>Remove & Sign Out</GoldBtn>
            </div>
          </div>
        </div>
      );

      if(settingsView==="resetConfirm") return (
        <div style={{ maxWidth:480 }}>
          <button onClick={()=>setSView("main")} style={{ background:"none", border:"none", cursor:"pointer", color:t.muted, fontSize:13, padding:"0 0 16px", display:"flex", alignItems:"center", gap:6 }}>← Back</button>
          <div style={{ background:t.surface, border:`1px solid ${t.dangerBorder}`, borderRadius:12, padding:"24px", borderTop:`3px solid ${t.danger}` }}>
            <p style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:600, color:t.danger, margin:"0 0 8px" }}>⚠️ Reset All Portfolio Data</p>
            <p style={{ fontSize:13, color:t.textSec, margin:"0 0 20px", lineHeight:1.7 }}>Permanently deletes all entries, profile info, photo, passwords, themes, and login settings. <strong>Cannot be undone.</strong></p>
            <div style={{ display:"flex", gap:10 }}>
              <GoldBtn outline onClick={()=>setSView("main")}>Cancel</GoldBtn>
              <GoldBtn danger onClick={resetAll}>Yes, Delete Everything</GoldBtn>
            </div>
          </div>
        </div>
      );

      /* Main settings — logged in */
      const presets = dark ? DARK_PRESETS : LIGHT_PRESETS;
      return (
        <div style={{ maxWidth:580 }}>
          {/* Status banner */}
          <div style={{ background:dark?"rgba(201,168,76,0.1)":"#fffbf0", border:`1px solid ${t.gold}`, borderRadius:10, padding:"14px 18px", marginBottom:22, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
            <div>
              <p style={{ fontSize:12, color:t.gold, fontWeight:500, margin:"0 0 2px", textTransform:"uppercase", letterSpacing:"0.06em" }}>✏️ Edit Mode Active</p>
              <p style={{ fontSize:13, color:t.textSec, margin:0 }}>{authMethod==="google"?`Signed in as ${ls.raw("pf_google_email")||"Google"}`:"Signed in with password"}</p>
            </div>
            <GoldBtn outline onClick={lockDown}>🔒 Lock & Sign Out</GoldBtn>
          </div>

          {/* ── Background Theme (admin only) ── */}
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, overflow:"hidden", marginBottom:14 }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${t.border}`, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>🎨</span>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600, color:t.text, margin:0 }}>Background Theme</p>
            </div>
            <div style={{ padding:"18px 20px" }}>
              <p style={{ fontSize:13, color:t.muted, margin:"0 0 14px" }}>{dark?"Dark mode palette":"Light mode palette"} — pick a background color scheme.</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:12, marginBottom:14 }}>
                {presets.map(p=>(
                  <div key={p.id} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
                    <div className={`theme-swatch${bgPreset===p.id?" active":""}`}
                      style={{ background:p.swatch, width:36, height:36, borderRadius:8, cursor:"pointer", border:bgPreset===p.id?`2px solid ${t.gold}`:`2px solid ${t.border}`, boxShadow:bgPreset===p.id?`0 0 0 3px rgba(201,168,76,0.3)`:"none", transition:"all .15s" }}
                      onClick={()=>pickPreset(p.id)} title={p.label} />
                    <span style={{ fontSize:10, color:bgPreset===p.id?t.gold:t.muted, fontWeight:bgPreset===p.id?600:400, textAlign:"center", width:54, lineHeight:1.2 }}>{p.label}</span>
                  </div>
                ))}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <p style={{ fontSize:12, color:t.muted, margin:0 }}>Also switch light/dark mode:</p>
                <button onClick={toggleDark}
                  style={{ width:44, height:24, borderRadius:12, background:dark?t.gold:t.border, border:"none", cursor:"pointer", position:"relative", transition:"background .2s", flexShrink:0 }}>
                  <span style={{ position:"absolute", top:3, left:dark?22:3, width:18, height:18, borderRadius:"50%", background:"#fff", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,0.25)" }} />
                </button>
                <span style={{ fontSize:12, color:t.muted }}>{dark?"Dark":"Light"}</span>
              </div>
            </div>
          </div>

          {/* Google login */}
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, overflow:"hidden", marginBottom:14 }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${t.border}`, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>🔵</span>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600, color:t.text, margin:0 }}>Google Login</p>
            </div>
            <div style={{ padding:"18px 20px" }}>
              {GOOGLE_READY?( googleEmail?(
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
                  <div>
                    <p style={{ fontSize:12, color:t.muted, margin:"0 0 2px", textTransform:"uppercase", letterSpacing:"0.06em", fontWeight:500 }}>Allowed Account</p>
                    <p style={{ fontSize:14, color:t.text, margin:0 }}>{googleEmail}</p>
                  </div>
                  <IconBtn onClick={()=>setSView("changeEmail")} label="Change Account" />
                </div>
              ):(
                <div><p style={{ fontSize:13, color:t.muted, margin:"0 0 12px", lineHeight:1.7 }}>No Google account registered yet.</p><div ref={gBtnRef} className="g-btn-wrap" style={{ justifyContent:"flex-start" }} /></div>
              )):(
                <p style={{ fontSize:13, color:t.muted, margin:0, lineHeight:1.7 }}>Google login not configured. Add your Client ID to <code style={{ background:t.border, padding:"1px 5px", borderRadius:3 }}>index.html</code>.</p>
              )}
            </div>
          </div>

          {/* Password */}
          <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:12, overflow:"hidden", marginBottom:14 }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${t.border}`, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>🔑</span>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600, color:t.text, margin:0 }}>Password Login</p>
            </div>
            <div style={{ padding:"18px 20px" }}>
              <p style={{ fontSize:13, color:t.muted, margin:"0 0 14px" }}>{ls.raw("pf_pw")?"Update your edit password.":"Set a password as an alternative login method."}</p>
              <PwForm mode={ls.raw("pf_pw")?"change":"set"} onSuccess={()=>{}} />
            </div>
          </div>

          {/* Danger zone */}
          <div style={{ background:t.surface, border:`1px solid ${t.dangerBorder}`, borderRadius:12, overflow:"hidden" }}>
            <div style={{ padding:"16px 20px", borderBottom:`1px solid ${t.dangerBorder}`, display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:18 }}>⚠️</span>
              <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:600, color:t.danger, margin:0 }}>Danger Zone</p>
            </div>
            <div style={{ padding:"18px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
              <div>
                <p style={{ fontSize:14, color:t.text, margin:"0 0 2px", fontWeight:500 }}>Reset All Portfolio Data</p>
                <p style={{ fontSize:12, color:t.muted, margin:0 }}>Permanently deletes all entries, settings, and login info.</p>
              </div>
              <GoldBtn danger onClick={()=>setSView("resetConfirm")}>Reset Everything</GoldBtn>
            </div>
          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════
       SECTION CONTENT RENDERS
    ════════════════════════════════════════ */
    const renderExpCard = (exp,i)=>{
      const body=<>
        <p style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:600, color:t.text, margin:"0 0 2px" }}>{exp.role||"Role"}</p>
        <p style={{ fontSize:14, fontWeight:500, color:dark?sec("experience").darkColor:sec("experience").color, margin:"0 0 4px" }}>{exp.company}</p>
        <p style={{ fontSize:12, color:t.muted, margin:"0 0 10px", fontFamily:"'IBM Plex Mono',monospace" }}>{exp.startDate} — {exp.current?"Present":exp.endDate}</p>
        {exp.description&&<p style={{ fontSize:13.5, color:t.textSec, lineHeight:1.75, margin:0 }}>{exp.description}</p>}
      </>;
      return editMode
        ?<EditCard key={i} sectionId="experience" image={exp.image} onEdit={()=>openEdit("experience",i,exp)} onDelete={()=>del("experience",i)}>{body}</EditCard>
        :<ViewCard key={i} sectionId="experience" image={exp.image}>{body}</ViewCard>;
    };
    const renderProjCard = (proj,i)=>{
      const body=<>
        <div style={{ display:"flex", alignItems:"baseline", gap:10, marginBottom:4, flexWrap:"wrap" }}>
          <p style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:600, color:t.text, margin:0 }}>{proj.name}</p>
          {proj.year&&<span style={{ fontSize:12, color:t.muted, fontFamily:"'IBM Plex Mono',monospace" }}>{proj.year}</span>}
        </div>
        {proj.description&&<p style={{ fontSize:13.5, color:t.textSec, lineHeight:1.75, margin:"6px 0 10px" }}>{proj.description}</p>}
        {proj.tech&&<div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{proj.tech.split(",").map(tk=>tk.trim()).filter(Boolean).map((tk,ti)=><Badge key={ti} sectionId="projects">{tk}</Badge>)}</div>}
        {proj.link&&<a href={proj.link} target="_blank" rel="noopener noreferrer" style={{ fontSize:12, color:dark?sec("projects").darkColor:sec("projects").color, display:"inline-block", marginTop:8, wordBreak:"break-all" }}>🔗 {proj.link}</a>}
      </>;
      return editMode
        ?<EditCard key={i} sectionId="projects" image={proj.image} onEdit={()=>openEdit("project",i,proj)} onDelete={()=>del("project",i)}>{body}</EditCard>
        :<ViewCard key={i} sectionId="projects" image={proj.image}>{body}</ViewCard>;
    };
    const renderSkillCard = (sk,i)=>{
      const body=<>
        <p style={{ fontFamily:"'Playfair Display',serif", fontSize:15, fontWeight:600, color:dark?sec("skills").darkColor:sec("skills").color, margin:"0 0 10px" }}>{sk.category}</p>
        <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{(sk.items||"").split(",").map(s=>s.trim()).filter(Boolean).map((s,si)=><Badge key={si} sectionId="skills">{s}</Badge>)}</div>
      </>;
      return editMode
        ?<EditCard key={i} sectionId="skills" image={sk.image} onEdit={()=>openEdit("skill",i,sk)} onDelete={()=>del("skill",i)}>{body}</EditCard>
        :<ViewCard key={i} sectionId="skills" image={sk.image}>{body}</ViewCard>;
    };
    const renderEduCard = (edu,i)=>{
      const body=<>
        <p style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:600, color:t.text, margin:"0 0 2px" }}>{edu.degree}{edu.field?` in ${edu.field}`:""}</p>
        <p style={{ fontSize:14, fontWeight:500, color:dark?sec("education").darkColor:sec("education").color, margin:"0 0 4px" }}>{edu.institution}</p>
        <p style={{ fontSize:12, color:t.muted, margin:"0 0 8px", fontFamily:"'IBM Plex Mono',monospace" }}>{edu.startYear} — {edu.endYear}{edu.gpa?` · GPA: ${edu.gpa}`:""}</p>
        {edu.description&&<p style={{ fontSize:13.5, color:t.textSec, lineHeight:1.75, margin:0 }}>{edu.description}</p>}
      </>;
      return editMode
        ?<EditCard key={i} sectionId="education" image={edu.image} onEdit={()=>openEdit("education",i,edu)} onDelete={()=>del("education",i)}>{body}</EditCard>
        :<ViewCard key={i} sectionId="education" image={edu.image}>{body}</ViewCard>;
    };

    const renderSection = ()=>{
      if(active==="settings") return renderSettings();

      if(active==="about") return editMode?(
        <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:10, padding:"20px" }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:12, fontWeight:600, color:activeColor, marginTop:0, marginBottom:18, paddingBottom:10, borderBottom:`1px solid ${t.border}`, textTransform:"uppercase", letterSpacing:"0.08em" }}>Personal Information</h2>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"0 16px" }}>
            <Field label="Full Name"            value={about.name}     onChange={e=>setAbout(p=>({...p,name:e.target.value}))}     placeholder="Jane Smith"           half />
            <Field label="Professional Title"   value={about.title}    onChange={e=>setAbout(p=>({...p,title:e.target.value}))}    placeholder="Software Engineer"    half />
            <Field label="Location"             value={about.location} onChange={e=>setAbout(p=>({...p,location:e.target.value}))} placeholder="New York, NY"         half />
            <Field label="Email"                value={about.email}    onChange={e=>setAbout(p=>({...p,email:e.target.value}))}    placeholder="jane@example.com"     type="email" half />
            <Field label="Website"              value={about.website}  onChange={e=>setAbout(p=>({...p,website:e.target.value}))}  placeholder="https://yoursite.com" half />
            <Field label="Professional Summary" value={about.bio}     onChange={e=>setAbout(p=>({...p,bio:e.target.value}))}      placeholder="Concise summary of your background, expertise, and goals…" as="textarea" rows={4} />
          </div>
          <div style={{ marginBottom:18, paddingTop:14, borderTop:`1px solid ${t.border}` }}>
            <p style={{ fontFamily:"'Playfair Display',serif", fontSize:12, fontWeight:600, color:activeColor, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.08em" }}>Social & Links</p>
            <p style={{ fontSize:12, color:t.muted, marginBottom:14 }}>Choose which platforms to display on your public profile.</p>
            {/* Active social fields */}
            {(about.socialEnabled||[]).length>0&&(
              <div style={{ marginBottom:14 }}>
                {(about.socialEnabled||[]).map(key=>{
                  const s=SOCIALS.find(x=>x.key===key); if(!s) return null;
                  return (
                    <div key={key} style={{ display:"flex", alignItems:"flex-end", gap:8, marginBottom:10 }}>
                      <div style={{ flex:1 }}>
                        <label style={{ display:"block", fontSize:11, fontWeight:500, color:t.muted, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>{s.icon} {s.label}</label>
                        <input type="text" value={about[key]||""} onChange={e=>setAbout(p=>({...p,[key]:e.target.value}))}
                          placeholder="Username or full URL"
                          style={{ width:"100%", background:t.inputBg, border:`1px solid ${t.border}`, borderRadius:6, padding:"10px 12px", fontSize:14, color:t.text, outline:"none", boxSizing:"border-box" }} />
                      </div>
                      <button
                        onClick={()=>setAbout(p=>({...p, socialEnabled:(p.socialEnabled||[]).filter(k=>k!==key)}))}
                        title={`Remove ${s.label}`}
                        style={{ background:"none", border:`1px solid ${t.border}`, borderRadius:6, padding:"10px 12px", cursor:"pointer", color:t.muted, fontSize:13, minHeight:42, flexShrink:0, transition:"all .12s" }}
                        onMouseEnter={e=>{ e.currentTarget.style.borderColor="#e87070"; e.currentTarget.style.color="#d04040"; }}
                        onMouseLeave={e=>{ e.currentTarget.style.borderColor=t.border; e.currentTarget.style.color=t.muted; }}>
                        × Remove
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
            {/* Dropdown to add a platform */}
            {(about.socialEnabled||[]).length < SOCIALS.length&&(
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <select
                  value=""
                  onChange={e=>{
                    const key=e.target.value; if(!key) return;
                    setAbout(p=>({...p, socialEnabled:[...(p.socialEnabled||[]), key]}));
                  }}
                  style={{ flex:1, background:t.inputBg, border:`1px solid ${t.border}`, borderRadius:8, padding:"10px 14px", fontSize:14, color:t.muted, outline:"none", cursor:"pointer", appearance:"none", WebkitAppearance:"none" }}>
                  <option value="">＋ Add a social platform…</option>
                  {SOCIALS.filter(s=>!(about.socialEnabled||[]).includes(s.key)).map(s=>(
                    <option key={s.key} value={s.key}>{s.icon} {s.label}</option>
                  ))}
                </select>
              </div>
            )}
            {(about.socialEnabled||[]).length===0&&(
              <p style={{ fontSize:13, color:t.muted, fontStyle:"italic", marginTop:6 }}>No platforms added yet. Use the dropdown above to add one.</p>
            )}
          </div>
          {photoErr&&<p style={{ color:t.danger, fontSize:13, marginBottom:10, padding:"8px 12px", background:t.dangerBg, borderRadius:6, border:`1px solid ${t.dangerBorder}` }}>{photoErr}</p>}
          <div style={{ display:"flex", justifyContent:"flex-end" }}><GoldBtn onClick={saveAbout}>Save Changes</GoldBtn></div>
        </div>
      ):(
        /* Read-only About view */
        <div style={{ background:t.surface, border:`1px solid ${t.border}`, borderRadius:10, overflow:"hidden" }}>
          <div style={{ background:t.sidebar, padding:"32px 28px", textAlign:"center", borderBottom:`3px solid ${activeColor}` }}>
            {photoSrc&&<img src={photoSrc} alt="Profile" style={{ width:90, height:90, borderRadius:"50%", objectFit:"cover", border:`3px solid ${t.gold}`, display:"block", margin:"0 auto 14px" }} />}
            <h2 style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:700, color: dark?"#fff":"#ffffff", margin:"0 0 6px" }}>{about.name||"Your Name"}</h2>
            <p style={{ color:t.gold, fontSize:14, margin:"0 0 10px", fontWeight:500 }}>{about.title}</p>
            {about.location&&<p style={{ color: dark?t.sideMuted:"#c8c0b8", fontSize:13 }}>📍 {about.location}</p>}
          </div>
          <div style={{ padding:"22px 28px" }}>
            {about.bio&&<p style={{ fontSize:15, color:t.textSec, lineHeight:1.8, marginBottom:20 }}>{about.bio}</p>}
            {/* Contact links */}
            {(about.email||about.website)&&(
              <div style={{ display:"flex", flexWrap:"wrap", gap:10, marginBottom:16 }}>
                {about.email&&<a href={`mailto:${about.email}`} style={{ fontSize:13, color:activeColor, textDecoration:"none" }}>✉️ {about.email}</a>}
                {about.website&&<a href={about.website} target="_blank" rel="noopener noreferrer" style={{ fontSize:13, color:activeColor, textDecoration:"none" }}>🌐 Website</a>}
              </div>
            )}
            {/* Social links — only enabled platforms with a value */}
            {(about.socialEnabled||[]).some(k=>about[k])&&(
              <>
                <div style={{ height:1, background:t.border, marginBottom:16 }} />
                <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
                  {(about.socialEnabled||[]).map(key=>{
                    const s=SOCIALS.find(x=>x.key===key); if(!s) return null;
                    const url=buildSocialUrl(key,about[key]); if(!url) return null;
                    return (
                      <a key={key} href={url} target="_blank" rel="noopener noreferrer"
                        style={{ display:"flex", alignItems:"center", gap:6, fontSize:13, color:activeColor, textDecoration:"none", background:t.surfaceAlt, border:`1px solid ${t.border}`, borderRadius:20, padding:"5px 12px" }}>
                        <span>{s.icon}</span><span>{s.label}</span>
                      </a>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
      );

      if(active==="experience") return <>
        {editMode&&<div style={{ display:"flex", justifyContent:"flex-end", marginBottom:18 }}><GoldBtn onClick={()=>openAdd("experience")}>+ Add Experience</GoldBtn></div>}
        {experiences.length===0&&<Empty label="No work experience added yet." />}
        {experiences.map(renderExpCard)}
      </>;
      if(active==="projects") return <>
        {editMode&&<div style={{ display:"flex", justifyContent:"flex-end", marginBottom:18 }}><GoldBtn onClick={()=>openAdd("project")}>+ Add Project</GoldBtn></div>}
        {projects.length===0&&<Empty label="No projects added yet." />}
        {projects.map(renderProjCard)}
      </>;
      if(active==="skills") return <>
        {editMode&&<div style={{ display:"flex", justifyContent:"flex-end", marginBottom:18 }}><GoldBtn onClick={()=>openAdd("skill")}>+ Add Skill Group</GoldBtn></div>}
        {skills.length===0&&<Empty label="No skills added yet." />}
        {skills.map(renderSkillCard)}
      </>;
      if(active==="education") return <>
        {editMode&&<div style={{ display:"flex", justifyContent:"flex-end", marginBottom:18 }}><GoldBtn onClick={()=>openAdd("education")}>+ Add Education</GoldBtn></div>}
        {education.length===0&&<Empty label="No education added yet." />}
        {education.map(renderEduCard)}
      </>;
      return null;
    };

    /* ════════════════════════════════════════
       MAIN RENDER
    ════════════════════════════════════════ */
    return (
      <ThemeCtx.Provider value={{ t, dark }}>
        <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{ display:"none" }} />
        <div className={`overlay${menuOpen?" visible":""}`} onClick={()=>setMenu(false)} />

        {/* Mobile topbar */}
        <div className="topbar" style={{ background:t.topbar, borderBottom:`1px solid ${t.sideBorder}` }}>
          <button onClick={()=>setMenu(!menuOpen)} style={{ background:"none", border:"none", cursor:"pointer", padding:8, display:"flex", alignItems:"center" }}>
            <HamburgerIcon open={menuOpen} color={dark?"#c8bfb0":"#1a1a1a"} />
          </button>
          <p style={{ fontFamily:"'Playfair Display',serif", fontSize:16, color:sideTextColor, fontWeight:600, flex:1, textAlign:"center" }}>{about.name||"Portfolio"}</p>
          <button onClick={toggleDark} style={{ background:"none", border:"none", cursor:"pointer", fontSize:18, padding:8 }}>{dark?"☀️":"🌙"}</button>
        </div>

        {/* Sidebar — FIX: now uses light colors in light mode */}
        <div className={`sidebar${menuOpen?" open":""}`} style={{ background:t.sidebar, borderRight:`1px solid ${t.sideBorder}` }}>
          {/* Profile */}
          <div style={{ padding:"28px 20px 20px", borderBottom:`1px solid ${t.sideBorder}` }}>
            <div onClick={()=>editMode&&fileRef.current.click()}
              style={{ width:68, height:68, borderRadius:"50%", background:t.sidebarHov, border:`2px solid ${t.gold}`, margin:"0 auto 12px", cursor:editMode?"pointer":"default", display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
              {photoSrc?<img src={photoSrc} alt="Profile" style={{ width:"100%", height:"100%", objectFit:"cover" }} />:<span style={{ fontSize:22, color:t.gold }}>{editMode?"+":" "}</span>}
            </div>
            <p style={{ color:sideTextColor, fontSize:14, textAlign:"center", margin:"0 0 3px", fontWeight:500, fontFamily:"'Playfair Display',serif" }}>{about.name||"Portfolio"}</p>
            <p style={{ color:sideMutedColor, fontSize:12, textAlign:"center", margin:0 }}>{about.title}</p>
            {editMode&&<div style={{ marginTop:10, textAlign:"center" }}><span style={{ fontSize:11, background:"rgba(201,168,76,0.15)", color:t.gold, border:`1px solid ${t.gold}`, borderRadius:20, padding:"3px 10px", letterSpacing:"0.05em" }}>✏️ Edit Mode</span></div>}
          </div>

          {/* Nav */}
          <nav style={{ padding:"12px 0", flex:1 }}>
            {SECTIONS.map(s=>{
              const isActive=active===s.id; const color=dark?s.darkColor:s.color;
              return (
                <button key={s.id} onClick={()=>navTo(s.id)}
                  style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"12px 20px", background:isActive?sideActiveBg:"transparent", border:"none", borderLeft:`3px solid ${isActive?color:"transparent"}`, color:isActive?color:sideMutedColor, fontSize:14, fontWeight:isActive?600:400, cursor:"pointer", textAlign:"left", transition:"all .12s", minHeight:44 }}>
                  <span style={{ fontSize:16 }}>{s.icon}</span>
                  <span>{s.label}</span>
                  {isActive&&<span style={{ marginLeft:"auto", width:6, height:6, borderRadius:"50%", background:color, flexShrink:0 }} />}
                </button>
              );
            })}

            <div style={{ margin:"8px 20px", height:1, background:t.sideBorder }} />

            {/* Settings */}
            <button onClick={()=>navTo("settings")}
              style={{ display:"flex", alignItems:"center", gap:10, width:"100%", padding:"12px 20px", background:active==="settings"?sideActiveBg:"transparent", border:"none", borderLeft:`3px solid ${active==="settings"?settingsColor:"transparent"}`, color:active==="settings"?settingsColor:sideMutedColor, fontSize:14, fontWeight:active==="settings"?600:400, cursor:"pointer", textAlign:"left", transition:"all .12s", minHeight:44, overflow:"hidden" }}>
              <span style={{ fontSize:16, flexShrink:0 }}>⚙️</span>
              <span style={{ flexShrink:0 }}>Settings</span>
              <span style={{ marginLeft:"auto", display:"flex", alignItems:"center", flexShrink:0 }}>
                {!editMode
                  ?<span style={{ fontSize:10, background:"rgba(201,168,76,0.2)", color:t.gold, border:`1px solid rgba(201,168,76,0.4)`, borderRadius:10, padding:"2px 8px", whiteSpace:"nowrap" }}>Login</span>
                  :active==="settings"?<span style={{ width:6, height:6, borderRadius:"50%", background:settingsColor, display:"inline-block" }} />:null
                }
              </span>
            </button>
          </nav>

          {/* Dark mode toggle */}
          <div style={{ padding:"14px 20px", borderTop:`1px solid ${t.sideBorder}` }}>
            <button onClick={toggleDark}
              style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:t.sidebarHov, border:`1px solid ${t.sideBorder}`, borderRadius:8, padding:"10px 14px", cursor:"pointer", fontSize:13, color:sideMutedColor, minHeight:44 }}>
              <span>{dark?"☀️":"🌙"}</span>
              <span>{dark?"Light Mode":"Dark Mode"}</span>
              <span style={{ marginLeft:"auto", width:28, height:16, borderRadius:8, background:dark?t.gold:t.sideBorder, position:"relative", flexShrink:0, display:"inline-block", transition:"background .2s" }}>
                <span style={{ position:"absolute", top:2, left:dark?14:2, width:12, height:12, borderRadius:"50%", background:"#fff", transition:"left .2s" }} />
              </span>
            </button>
          </div>
        </div>

        {/* Main content */}
        <div className="main-content" style={{ background:t.bg, padding:"40px 40px 60px", transition:"background .25s", minHeight:"100vh" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:28 }}>
            <div>
              <SectionLabel sectionId={active} />
              <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(22px,4vw,30px)", fontWeight:700, color:t.text, margin:"6px 0 0" }}>{active==="settings"?"Settings":activeSec?.label}</h1>
              <div style={{ width:38, height:3, background:activeColor, borderRadius:2, marginTop:8, transition:"background .2s" }} />
            </div>
            {saved&&<span style={{ background:dark?"#0e2a14":"#edf7ee", color:dark?"#50cc70":"#2d7a3a", fontSize:13, padding:"6px 14px", borderRadius:20, border:`1px solid ${dark?"#1a5028":"#b8e0bf"}` }}>✓ Saved</span>}
          </div>
          {renderSection()}
        </div>

        {/* ── Modals ── */}
        {modal==="experience"&&(
          <EditModal title={editIdx!==null?"Edit Experience":"Add Experience"} sectionId="experience" onClose={()=>setModal(null)} onSave={saveModal}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0 16px" }}>
              <Field label="Job Title / Role" value={draft.role||""} onChange={df("role")} placeholder="Software Engineer" half />
              <Field label="Company"          value={draft.company||""} onChange={df("company")} placeholder="Acme Corp" half />
              <Field label="Start Date"       value={draft.startDate||""} onChange={df("startDate")} placeholder="Jan 2022" half />
              <Field label="End Date"         value={draft.endDate||""} onChange={df("endDate")} placeholder="Dec 2023" half />
              <div style={{ flex:"1 1 100%", marginBottom:14 }}>
                <label style={{ display:"flex", alignItems:"center", gap:10, fontSize:14, color:t.muted, cursor:"pointer", minHeight:36 }}>
                  <input type="checkbox" checked={draft.current||false} onChange={df("current")} style={{ width:16, height:16 }} /> Currently working here
                </label>
              </div>
              <Field label="Description / Achievements" value={draft.description||""} onChange={df("description")} as="textarea" rows={4} placeholder="Key responsibilities and achievements…" />
              <EntryImageUpload value={draft.image||""} onChange={dImg} />
            </div>
          </EditModal>
        )}
        {modal==="project"&&(
          <EditModal title={editIdx!==null?"Edit Project":"Add Project"} sectionId="projects" onClose={()=>setModal(null)} onSave={saveModal}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0 16px" }}>
              <Field label="Project Name" value={draft.name||""} onChange={df("name")} placeholder="My Awesome Project" half />
              <Field label="Year"         value={draft.year||""} onChange={df("year")} placeholder="2024" half />
              <Field label="Description"  value={draft.description||""} onChange={df("description")} as="textarea" rows={3} placeholder="What does this project do?" />
              <Field label="Technologies (comma-separated)" value={draft.tech||""} onChange={df("tech")} placeholder="React, TypeScript, Node.js" />
              <Field label="Link / URL"   value={draft.link||""} onChange={df("link")} placeholder="https://github.com/you/project" />
              <EntryImageUpload value={draft.image||""} onChange={dImg} />
            </div>
          </EditModal>
        )}
        {modal==="skill"&&(
          <EditModal title={editIdx!==null?"Edit Skill Group":"Add Skill Group"} sectionId="skills" onClose={()=>setModal(null)} onSave={saveModal}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0 16px" }}>
              <Field label="Category" value={draft.category||""} onChange={df("category")} placeholder="Languages, Frameworks, Tools…" />
              <Field label="Skills (comma-separated)" value={draft.items||""} onChange={df("items")} as="textarea" rows={3} placeholder="Python, JavaScript, TypeScript…" />
              <EntryImageUpload value={draft.image||""} onChange={dImg} />
            </div>
          </EditModal>
        )}
        {modal==="education"&&(
          <EditModal title={editIdx!==null?"Edit Education":"Add Education"} sectionId="education" onClose={()=>setModal(null)} onSave={saveModal}>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0 16px" }}>
              <Field label="Institution"    value={draft.institution||""} onChange={df("institution")} placeholder="MIT" />
              <Field label="Degree"         value={draft.degree||""} onChange={df("degree")} placeholder="B.S., M.S., Ph.D…" half />
              <Field label="Field of Study" value={draft.field||""} onChange={df("field")} placeholder="Computer Science" half />
              <Field label="Start Year"     value={draft.startYear||""} onChange={df("startYear")} placeholder="2018" half />
              <Field label="End Year"       value={draft.endYear||""} onChange={df("endYear")} placeholder="2022" half />
              <Field label="GPA (optional)" value={draft.gpa||""} onChange={df("gpa")} placeholder="3.9 / 4.0" half />
              <Field label="Additional Notes" value={draft.description||""} onChange={df("description")} as="textarea" rows={3} placeholder="Honors, thesis, relevant coursework…" />
              <EntryImageUpload value={draft.image||""} onChange={dImg} />
            </div>
          </EditModal>
        )}
      </ThemeCtx.Provider>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Portfolio />);
</script>
</body>
</html>
